<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 900px;
            width: 100%;
        }

        .title {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .timezone-name {
            color: #fff;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time-display {
            font-size: 2.5em;
            font-weight: bold;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            margin-bottom: 8px;
        }

        .date-display {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .utc-offset {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
            font-style: italic;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .btn.active {
            background: rgba(0, 255, 136, 0.3);
            border-color: #00ff88;
            color: #00ff88;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .time-display {
                font-size: 2em;
            }

            .container {
                padding: 25px;
            }
        }

        .add-timezone-form {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .timezone-select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.95em;
            cursor: pointer;
        }

        .timezone-select option {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🌍 Multi-Timezone Clock</h1>
        
        <div class="clocks-grid" id="clocksGrid">
            <!-- Clock cards will be generated here -->
        </div>

        <div class="add-timezone-form">
            <select class="timezone-select" id="timezoneSelect">
                <option value="">Select timezone to add...</option>
            </select>
            <button class="btn" onclick="addTimezone()">Add Timezone</button>
            <button class="btn" onclick="resetToDefault()">Reset to Default</button>
        </div>

        <div class="controls">
            <button class="btn active" onclick="toggleFormat()" id="formatBtn">24-Hour Format</button>
        </div>
    </div>

    <script>
        // List of all available timezones
        const ALL_TIMEZONES = [
            'UTC',
            'America/New_York',
            'America/Chicago',
            'America/Denver',
            'America/Los_Angeles',
            'America/Anchorage',
            'Pacific/Honolulu',
            'Europe/London',
            'Europe/Paris',
            'Europe/Berlin',
            'Europe/Moscow',
            'Asia/Dubai',
            'Asia/Kolkata',
            'Asia/Bangkok',
            'Asia/Shanghai',
            'Asia/Tokyo',
            'Asia/Seoul',
            'Australia/Sydney',
            'Australia/Melbourne',
            'Australia/Brisbane',
            'Pacific/Auckland',
            'America/Toronto',
            'America/Mexico_City',
            'America/Sao_Paulo',
            'America/Buenos_Aires',
            'Africa/Cairo',
            'Africa/Johannesburg',
            'Asia/Singapore',
            'Asia/Hong_Kong',
            'Asia/Manila'
        ];

        // Default timezones to display
        const DEFAULT_TIMEZONES = [
            'UTC',
            'America/New_York',
            'Europe/London',
            'Asia/Tokyo'
        ];

        let displayedTimezones = [...DEFAULT_TIMEZONES];
        let use24HourFormat = true;

        // Initialize the page
        function init() {
            populateTimezoneSelect();
            renderClocks();
            updateClocks();
            setInterval(updateClocks, 1000);
        }

        // Populate the timezone select dropdown
        function populateTimezoneSelect() {
            const select = document.getElementById('timezoneSelect');
            ALL_TIMEZONES.forEach(tz => {
                if (!displayedTimezones.includes(tz)) {
                    const option = document.createElement('option');
                    option.value = tz;
                    option.textContent = tz.replace(/_/g, ' ');
                    select.appendChild(option);
                }
            });
        }

        // Render clock cards
        function renderClocks() {
            const grid = document.getElementById('clocksGrid');
            grid.innerHTML = '';

            displayedTimezones.forEach((tz, index) => {
                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <div class="timezone-name">${tz.replace(/_/g, ' ')}</div>
                    <div class="time-display" data-timezone="${tz}">--:--:--</div>
                    <div class="date-display" data-date="${tz}">Loading...</div>
                    <div class="utc-offset" data-offset="${tz}">UTC</div>
                    ${index > 0 ? `<button class="btn" style="margin-top: 10px; font-size: 0.8em;" onclick="removeTimezone('${tz}')">Remove</button>` : ''}
                `;
                grid.appendChild(card);
            });
        }

        // Update all clock displays
        function updateClocks() {
            const now = new Date();

            displayedTimezones.forEach(tz => {
                // Get time in specific timezone
                const timeString = now.toLocaleString('en-US', {
                    timeZone: tz,
                    hour12: !use24HourFormat,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                const dateString = now.toLocaleString('en-US', {
                    timeZone: tz,
                    weekday: 'short',
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                // Calculate UTC offset
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: tz,
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });

                const parts = formatter.formatToParts(now);
                const tzTime = new Date(
                    parts.find(p => p.type === 'year').value,
                    parseInt(parts.find(p => p.type === 'month').value) - 1,
                    parts.find(p => p.type === 'day').value,
                    parts.find(p => p.type === 'hour').value,
                    parts.find(p => p.type === 'minute').value,
                    parts.find(p => p.type === 'second').value
                );

                const offset = (now - tzTime) / (1000 * 60);
                const offsetHours = Math.round(offset / 60);
                const offsetMins = Math.abs(offset % 60);
                const offsetStr = `UTC ${offsetHours >= 0 ? '+' : ''}${offsetHours}:${String(offsetMins).padStart(2, '0')}`;

                // Update display
                const timeElement = document.querySelector(`[data-timezone="${tz}"]`);
                const dateElement = document.querySelector(`[data-date="${tz}"]`);
                const offsetElement = document.querySelector(`[data-offset="${tz}"]`);

                if (timeElement) timeElement.textContent = timeString;
                if (dateElement) dateElement.textContent = dateString;
                if (offsetElement) offsetElement.textContent = offsetStr;
            });
        }

        // Add a new timezone
        function addTimezone() {
            const select = document.getElementById('timezoneSelect');
            const tz = select.value;

            if (tz && !displayedTimezones.includes(tz)) {
                displayedTimezones.push(tz);
                select.removeChild(select.querySelector(`option[value="${tz}"]`));
                select.value = '';
                renderClocks();
                updateClocks();
            }
        }

        // Remove a timezone
        function removeTimezone(tz) {
            displayedTimezones = displayedTimezones.filter(t => t !== tz);
            const select = document.getElementById('timezoneSelect');
            const option = document.createElement('option');
            option.value = tz;
            option.textContent = tz.replace(/_/g, ' ');
            select.appendChild(option);
            renderClocks();
        }

        // Reset to default timezones
        function resetToDefault() {
            displayedTimezones = [...DEFAULT_TIMEZONES];
            const select = document.getElementById('timezoneSelect');
            select.innerHTML = '<option value="">Select timezone to add...</option>';
            populateTimezoneSelect();
            renderClocks();
            updateClocks();
        }

        // Toggle between 12-hour and 24-hour format
        function toggleFormat() {
            use24HourFormat = !use24HourFormat;
            const btn = document.getElementById('formatBtn');
            btn.textContent = use24HourFormat ? '24-Hour Format' : '12-Hour Format';
            updateClocks();
        }

        // Start the app
        init();
    </script>
</body>
</html>
